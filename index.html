<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hero Clicker RPG — Crónicas de Felandia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐱</text></svg>" />
</head>
<body>
  <div id="app" class="hidden">
    <header id="topbar">
      <div id="logo">🐱 <span>Hero Clicker <em>RPG</em></span></div>
      <div id="zone-name">—</div>
      <div id="progress-box">
        <div id="map-progress" title="Progreso de la zona"></div>
      </div>
      <div id="xp-box">
        <div id="level-badge">Nv. 1</div>
        <div class="bar xp-bar"><div id="xp-fill" class="fill"></div><span id="xp-text"></span></div>
      </div>
      <div id="top-controls">
        <button id="btn-font" class="icon-btn" title="Cambiar fuente (pixel / suave)">Aa</button>
        <button id="btn-story" class="icon-btn" title="Releer la historia">📖</button>
        <button id="btn-music" class="icon-btn" title="Música">🎵</button>
        <button id="btn-mute" class="icon-btn" title="Silenciar todo">🔊</button>
        <button id="btn-reset" class="icon-btn" title="Reiniciar partida">🔄</button>
      </div>
    </header>

    <main id="layout">
      <!-- ── Panel izquierdo ─────────────────────────────── -->
      <aside id="panel-left">
        <section class="card" id="hero-card">
          <div id="hero-identity">
            <span id="hero-emoji">🛡️</span>
            <div>
              <div id="hero-name">—</div>
              <div id="hero-class">—</div>
            </div>
          </div>
          <div id="stats-list"></div>
        </section>

        <section class="card">
          <h3 class="card-title">Equipamiento</h3>
          <div id="equip-slots"></div>
        </section>

        <section class="card" id="rpg-tabs">
          <div class="tab-buttons">
            <button id="tab-btn-attributes" class="tab-btn active">Atributos <span id="attr-dot" class="dot hidden">✨</span></button>
            <button id="tab-btn-skills" class="tab-btn">Habilidades <span id="skill-dot" class="dot hidden">🌟</span></button>
          </div>
          <div id="pane-attributes" class="tab-pane"></div>
          <div id="pane-skills" class="tab-pane hidden"></div>
        </section>
      </aside>

      <!-- ── Arena central ───────────────────────────────── -->
      <section id="panel-center">
        <div id="arena-wrap">
          <div id="arena-canvas"></div>
          <div id="arena-overlay">
            <div id="player-plate">
              <span id="player-plate-name"></span>
              <div id="player-hp-row">
                <span id="player-hp-heart">❤️</span>
                <div class="bar hp-bar big"><div id="player-hp-fill" class="fill"></div><span id="player-hp-text"></span></div>
              </div>
            </div>
            <div id="enemy-plate" class="hidden">
              <div id="enemy-name"></div>
              <div class="bar enemy-hp-bar"><div id="enemy-hp-fill" class="fill"></div><span id="enemy-hp-text"></span></div>
              <div class="bar atk-bar" title="Carga de ataque enemigo"><div id="enemy-atk-fill" class="fill"></div></div>
              <div id="enemy-status-row"></div>
            </div>
            <div id="buffs-row"></div>
            <div id="event-panel" class="hidden">
              <div id="event-emoji"></div>
              <div id="event-title"></div>
              <div id="event-text"></div>
              <div id="event-choices"></div>
              <div id="merchant-shop" class="hidden"></div>
            </div>
            <div id="advance-container" class="hidden">
              <button id="btn-advance">Avanzar por el Sendero ➡️</button>
            </div>
          </div>
        </div>

        <div id="skillbar">
          <div id="resource-box">
            <span id="resource-label"></span>
            <div class="bar resource-bar"><div id="resource-fill" class="fill"></div><span id="resource-text"></span></div>
            <div id="combo-pips" class="hidden"></div>
          </div>
          <div id="skills-grid"></div>
        </div>
        <div id="hint-bar">🖱️ Click / <kbd>Espacio</kbd>: atacar · <kbd>1-4</kbd>: habilidades</div>
      </section>

      <!-- ── Panel derecho ───────────────────────────────── -->
      <aside id="panel-right">
        <section class="card" id="inventory-card">
          <h3 class="card-title">🎒 Mochila <span id="gold-display">🪙 0</span></h3>
          <div id="inventory-grid"></div>
          <div id="item-detail" class="hidden"></div>
        </section>
        <section class="card" id="log-card">
          <h3 class="card-title log-toggle" id="log-toggle">📜 Registro de Batalla <span id="log-arrow">▾</span></h3>
          <div id="battle-log"></div>
        </section>
      </aside>
    </main>
  </div>

  <!-- ── Modales ──────────────────────────────────────────── -->
  <div id="modal-root"></div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
